name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      # 克隆内容仓库（博客文章、图片等）
      - name: Clone content repository
        run: |
          git clone --depth 1 https://github.com/Casumi713/Casumi-Blog.git content

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build site
        run: pnpm run build
        env:
          ENABLE_CONTENT_SYNC: false

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages   # GitHub Pages 可用的源分支
          folder: dist       # Astro 默认构建输出目录
          clean: true        # 清理旧文件
          jeykll: false      # 添加 .nojekyll 防止 _astro 目录被 Jekyll 忽略
