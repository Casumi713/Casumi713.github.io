name: Deploy to Codeberg Pages
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: https://codeberg.org/git-pages/action@v2
        with:
          token: ${{ forge.token }}
          source: dist/
